<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ways of Working</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 130% 70% at 50% 0%, #2a1158 0%, #0f0a1e 55%),
        linear-gradient(180deg, #0f0a1e 0%, #12102a 100%);
      font-family: Georgia, 'Times New Roman', serif;
      padding: 2rem 1rem 10rem;
      overflow-x: hidden;
    }

    /* ── Stars ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--dur) ease-in-out infinite var(--del);
    }
    @keyframes twinkle {
      0%, 100% { opacity: var(--lo); }
      50%       { opacity: var(--hi); }
    }

    /* ── Title ── */
    .app-title {
      position: relative; z-index: 3;
      color: rgba(201,150,42,0.5);
      font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 700; margin-bottom: 2.5rem;
    }

    /* ── Stage ── */
    .stage {
      position: relative; z-index: 3;
      width: 100%; max-width: 520px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ── PICK VIEW ── */
    .pick-view {
      display: flex; flex-direction: column; align-items: center; gap: 1.75rem;
      width: 100%;
    }
    .pick-view.hidden { display: none; }

    .pick-cards { display: flex; gap: 16px; align-items: flex-end; }

    .pick-card {
      width: 120px; height: 187px;
      border-radius: 10px; overflow: hidden;
      cursor: default; position: relative;
      box-shadow:
        0 16px 40px rgba(0,0,0,0.5),
        0 0 0 1.5px rgba(201,150,42,0.45);
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 0.45s ease, transform 0.5s cubic-bezier(0.34,1.3,0.64,1), box-shadow 0.3s;
    }
    .pick-card:nth-child(2) { transform: translateY(-30px); }

    .pick-card.shown          { opacity: 1; transform: translateY(0); }
    .pick-card:nth-child(2).shown { transform: translateY(-12px); }

    .pick-card.interactive { cursor: pointer; }
    .pick-card.interactive:hover {
      transform: translateY(-18px);
      box-shadow:
        0 26px 55px rgba(0,0,0,0.65),
        0 0 32px rgba(201,150,42,0.5),
        0 0 0 2px rgba(201,150,42,0.9);
    }
    .pick-card:nth-child(2).interactive:hover { transform: translateY(-30px); }

    /* Dismissed: slide down and fade out */
    .pick-card.dismissed {
      opacity: 0;
      transform: translateY(28px) scale(0.9);
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease, box-shadow 0.35s;
    }
    .pick-card:nth-child(2).dismissed { transform: translateY(16px) scale(0.9); }

    .pick-hint {
      font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(201,150,42,0.5);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 600; opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none; user-select: none;
    }

    /* ── REVEAL VIEW ── */
    .reveal-view {
      display: none;
      flex-direction: column; align-items: center; gap: 1.25rem;
      width: 100%;
      perspective: 1500px;
    }
    .reveal-view.active { display: flex; }

    /* ── Reveal card ── */
    .card {
      width: 100%; max-width: 520px; border-radius: 14px; overflow: hidden;
      box-shadow:
        0 28px 65px rgba(0,0,0,0.55), 0 8px 20px rgba(0,0,0,0.35),
        0 0 0 1.5px rgba(201,150,42,0.6);
      background: #fef6e4;
    }
    .card-header {
      padding: 1.2rem 1.75rem; display: flex; align-items: center; gap: 0.75rem;
    }
    .cat-icon {
      width: 2rem; height: 2rem; border-radius: 50%;
      background: rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; flex-shrink: 0;
    }
    .cat-label {
      font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .divider {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0 1.75rem; color: #b8870a; font-size: 0.5rem; opacity: 0.5;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #b8870a; opacity: 0.5;
    }
    .card-body { padding: 1.75rem 1.75rem 2.25rem; }
    .principle-text { font-size: 1.18rem; line-height: 1.8; color: #2d1b00; }
    .card-footer {
      padding: 1rem 1.75rem;
      background: rgba(0,0,0,0.04);
      border-top: 1px solid rgba(184,135,10,0.12);
    }
    .counter {
      font-size: 0.73rem; color: #9e7530;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: 0.04em;
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%; max-width: 520px;
      height: 3px; background: rgba(201,150,42,0.15);
      border-radius: 2px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #c9962a, #f0c040);
      border-radius: 2px;
    }

    /* ── HANDS ── */
    .hands-wrap {
      position: relative; z-index: 2;  /* sits behind stage z-index:3 */
      width: 392px; max-width: calc(100% - 2rem);
      height: 0; overflow: visible;
      pointer-events: none;
      display: flex; justify-content: space-between;
      margin-top: -55px;   /* overlap the bottom of the pick cards */
    }

    .hand {
      width: 115px; flex-shrink: 0;
      transition: transform 0.95s cubic-bezier(0.22,1,0.36,1);
    }
    .hand svg {
      width: 100%; height: auto;
      filter: drop-shadow(0 0 14px rgba(201,150,42,0.28));
    }

    .hand-right        { transform: translateY(500px); }
    .hand-right.raised { transform: translateY(0); }

    .hand-left         { transform: translateY(500px) scaleX(-1); }
    .hand-left.raised  { transform: translateY(0) scaleX(-1); }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .pick-card  { width: 88px; height: 137px; }
      .pick-cards { gap: 10px; }
      .hands-wrap { width: 284px; }   /* 3×88 + 2×10 */
      .hand       { width: 85px; }
      .card-body  { padding: 1.25rem 1.25rem 1.75rem; }
      .principle-text { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<p class="app-title">✦ &nbsp; Ways of Working &nbsp; ✦</p>

<div class="stage">

  <!-- PICK VIEW: 3 face-down cards -->
  <div class="pick-view" id="pick-view">
    <div class="pick-cards">
      <div class="pick-card" id="pc-0" onclick="chooseCard(0)"></div>
      <div class="pick-card" id="pc-1" onclick="chooseCard(1)"></div>
      <div class="pick-card" id="pc-2" onclick="chooseCard(2)"></div>
    </div>
    <p class="pick-hint" id="pick-hint">✦ &nbsp; Choose your card &nbsp; ✦</p>
  </div>

  <!-- REVEAL VIEW: principle card -->
  <div class="reveal-view" id="reveal-view">
    <div class="card" id="card">
      <div class="card-header" id="card-header">
        <div class="cat-icon" id="cat-icon"></div>
        <span class="cat-label" id="cat-label"></span>
      </div>
      <div class="divider">✦</div>
      <div class="card-body">
        <p class="principle-text" id="principle-text"></p>
      </div>
      <div class="card-footer">
        <span class="counter" id="counter"></span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

</div><!-- .stage -->

<!-- Mystical hands (z-index:2, behind stage z-index:3) -->
<div class="hands-wrap">
  <div class="hand hand-left"  id="hand-left"></div>
  <div class="hand hand-right" id="hand-right"></div>
</div>

<script>
// ── Data ────────────────────────────────────────────────────────────────────

const CATS = {
  "Slack etiquette":               { color: "#7c4dba", bg: "#f3f0ff", icon: "💬" },
  "Attitude":                      { color: "#b45309", bg: "#fef3c7", icon: "🌱" },
  "Communication":                 { color: "#1d4ed8", bg: "#eff6ff", icon: "📢" },
  "Decisions":                     { color: "#065f46", bg: "#ecfdf5", icon: "⚖️" },
  "Collaboration within the team": { color: "#9d174d", bg: "#fdf2f8", icon: "🤝" },
  "Give and receive feedback":     { color: "#0e7490", bg: "#ecfeff", icon: "💡" },

const PRINCIPLES = [
  { c: "Slack etiquette", t: "We document key outcomes from huddles, swarms, and meetings in our private Slack channel." },
  { c: "Slack etiquette", t: "We set a clear topic for huddles." },
  { c: "Slack etiquette", t: "We feel free to pop in and out of huddles when we want." },
  { c: "Attitude", t: "We have a positive bias mentality towards each other and other teams." },
  { c: "Communication", t: "We can reach out to each other anytime and manage our availability by muting notifications or responding later." },
  { c: "Communication", t: "We use visual illustrations when discussing ideas or problems." },
  { c: "Communication", t: "We use the team exploration holiday calendar." },
  { c: "Communication", t: "We make sure everyone understands important decisions made in meetings by sending them in writing and asking for confirmation." },
  { c: "Communication", t: "We write hand-offs so we remember where we left our work the day before." },
  { c: "Decisions", t: "We document and communicate decisions, including when we decide not to do something and why." },
  { c: "Decisions", t: "We make major decisions as a team and record them in the decision log. Smaller decisions are documented in Slack or Trello." },
  { c: "Collaboration within the team", t: "We remind each other to avoid rabbit holes." },
  { c: "Collaboration within the team", t: "We hold a weekly demo/planning session to ensure we focus on the most important work." },
  { c: "Collaboration within the team", t: "We decide together what we keep and what needs to be rewritten after prototyping." },
  { c: "Give and receive feedback", t: "We raise issues we notice and offer help if needed." },
  { c: "Give and receive feedback", t: "We avoid going deep into discussions about areas owned by other teams." },
  { c: "Give and receive feedback", t: "We consider the stage of the work (sketch, prototype, beta, production) when collaborating with other teams." },
  { c: "Give and receive feedback", t: "We give feedback in a constructive, kind, and non-confrontational way." },

// ── SVG templates ────────────────────────────────────────────────────────────

const BACK_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 187"

    <line x1="36" y1="0"  x2="13" y2="0"  stroke="#c9962a" stroke-width="0.4" opacity="0.22"/>
    <line x1="0" y1="36"  x2="0" y2="13"  stroke="#c9962a" stroke-width="0.4" opacity="0.22"/>
    <line x1="-36" y1="0" x2="-13" y2="0" stroke="#c9962a" stroke-width="0.4" opacity="0.22"/>
    <circle r="12" fill="none" stroke="#c9962a" stroke-width="1"/>
    <ellipse rx="7.5" ry="4.5" fill="none" stroke="#c9962a" stroke-width="0.9"/>
    <circle r="2.5" fill="#c9962a" opacity="0.75"/>
    <circle r="1"   fill="#120b27"/>
  </g>
  <text x="11"  y="25"  font-size="10" fill="#c9962a" opacity="0.4" font-family="serif">✦</text>
  <text x="100" y="25"  font-size="10" fill="#c9962a" opacity="0.4" font-family="serif">✦</text>
  <text x="11"  y="183" font-size="10" fill="#c9962a" opacity="0.4" font-family="serif">✦</text>
  <text x="100" y="183" font-size="10" fill="#c9962a" opacity="0.4" font-family="serif">✦</text>
</svg>`;

// Right-hand SVG. Left hand uses same SVG + CSS scaleX(-1).
const HAND_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 300">
  <!-- Sleeve / cuff -->
  <path d="M16,248 Q10,268 4,300 L136,300 Q130,268 124,248 Z"
        fill="#1a0a2e" stroke="#c9962a" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M16,248 Q70,243 124,248" fill="none" stroke="#c9962a" stroke-width="0.8" opacity="0.45"/>
  <line x1="13" y1="254" x2="127" y2="254" stroke="#c9962a" stroke-width="0.6" opacity="0.35"/>
  <!-- Center cuff diamond -->
  <path d="M70,262 L77,270 L70,278 L63,270 Z" fill="#c9962a" opacity="0.28"/>
  <path d="M70,262 L77,270 L70,278 L63,270 Z" fill="none" stroke="#c9962a" stroke-width="0.9"/>

  <!-- Cuff accent dots -->
  <circle cx="53" cy="270" r="1.5" fill="#c9962a" opacity="0.38"/>
  <circle cx="87" cy="270" r="1.5" fill="#c9962a" opacity="0.38"/>
  <!-- Palm -->
  <path d="M26,172 L26,248 Q70,256 114,248 L114,172
           Q114,163 108,161 L32,161 Q26,163 26,172 Z"
        fill="#1a0a2e" stroke="#c9962a" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- All-seeing eye on palm -->
  <g transform="translate(70,206)">
    <circle r="20" fill="none" stroke="#c9962a" stroke-width="0.45" opacity="0.28"/>
    <ellipse rx="12" ry="7" fill="none" stroke="#c9962a" stroke-width="0.9" opacity="0.8"/>
    <circle r="3.5" fill="#c9962a" opacity="0.62"/>
    <circle r="1.5" fill="#1a0a2e"/>
    <line x1="0" y1="-9"  x2="0"  y2="-14" stroke="#c9962a" stroke-width="0.6" opacity="0.42"/>
    <line x1="0" y1="9"   x2="0"  y2="14"  stroke="#c9962a" stroke-width="0.6" opacity="0.42"/>
    <line x1="-13" y1="0" x2="-18" y2="0"  stroke="#c9962a" stroke-width="0.6" opacity="0.42"/>
    <line x1="13"  y1="0" x2="18"  y2="0"  stroke="#c9962a" stroke-width="0.6" opacity="0.42"/>
  </g>
  <!-- Subtle palm line -->
  <path d="M32,177 Q70,172 108,177" fill="none" stroke="#c9962a" stroke-width="0.5" opacity="0.22"/>
  <!-- Thumb -->
  <path d="M26,178 Q11,174 7,157 Q3,140 14,132 Q22,126 30,135 L32,161 L26,178 Z"
        fill="#1a0a2e" stroke="#c9962a" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Index finger -->
  <path d="M34,161 L34,54 Q34,42 44,40 Q54,40 54,52 L54,161 Z"
        fill="#1a0a2e" stroke="#c9962a" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Middle finger (tallest) -->
  <path d="M58,161 L58,34 Q58,22 69,20 Q80,20 80,32 L80,161 Z"
        fill="#1a0a2e" stroke="#c9962a" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Ring finger -->
  <path d="M84,161 L84,46 Q84,34 94,32 Q104,32 104,44 L104,161 Z"
        fill="#1a0a2e" stroke="#c9962a" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Pinky -->
  <path d="M108,161 L108,68 Q108,57 117,56 Q126,56 126,67 L126,161 Z"
        fill="#1a0a2e" stroke="#c9962a" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Ring on middle finger -->
  <rect x="59" y="124" width="20" height="7" rx="3.5" fill="#c9962a" opacity="0.22"/>
  <rect x="59" y="124" width="20" height="7" rx="3.5" fill="none" stroke="#c9962a" stroke-width="0.8"/>
  <!-- Knuckle accents -->
  <path d="M35,162 Q44,158 53,162" fill="none" stroke="#c9962a" stroke-width="0.5" opacity="0.38"/>
  <path d="M59,162 Q69,158 79,162" fill="none" stroke="#c9962a" stroke-width="0.5" opacity="0.38"/>
  <path d="M85,162 Q94,158 103,162" fill="none" stroke="#c9962a" stroke-width="0.5" opacity="0.38"/>
  <path d="M109,162 Q117,158 125,162" fill="none" stroke="#c9962a" stroke-width="0.5" opacity="0.38"/>
  <!-- Star above cuff -->
  <text x="62" y="249" font-size="9" fill="#c9962a" opacity="0.32" font-family="serif">✦</text>

// ── Utils ────────────────────────────────────────────────────────────────────

const wait = ms => new Promise(r => setTimeout(r, ms));
const $    = id  => document.getElementById(id);

// ── Stars ────────────────────────────────────────────────────────────────────

function buildStars() {
  const wrap = $('stars');
  for (let i = 0; i < 100; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    const sz = Math.random() < 0.6 ? 1 : 2;
    el.style.cssText = [
      `width:${sz}px`, `height:${sz}px`,
      `top:${(Math.random()*100).toFixed(1)}%`,
      `left:${(Math.random()*100).toFixed(1)}%`,
      `--lo:${(Math.random()*0.12+0.02).toFixed(2)}`,
      `--hi:${(Math.random()*0.5+0.2).toFixed(2)}`,
      `--dur:${(Math.random()*3+2).toFixed(1)}s`,
      `--del:-${(Math.random()*6).toFixed(1)}s`,
    ].join(';');
    wrap.appendChild(el);
  }
}

// ── Random pick (cycles through all before repeating) ────────────────────────

const seen = new Set();

function pick() {
  if (seen.size === PRINCIPLES.length) seen.clear();
  let i;
  do { i = Math.floor(Math.random() * PRINCIPLES.length); } while (seen.has(i));
  seen.add(i);
  return i;
}

function pickThree() { return [pick(), pick(), pick()]; }

// ── Render principle into reveal card ────────────────────────────────────────

function renderPrinciple(idx) {
  const p   = PRINCIPLES[idx];
  const cat = CATS[p.c];
  $('card-header').style.background = cat.bg;
  $('cat-icon').textContent         = cat.icon;
  $('cat-label').textContent        = p.c;
  $('cat-label').style.color        = cat.color;
  $('principle-text').textContent   = p.t;
  $('counter').textContent          = `${seen.size} / ${PRINCIPLES.length}`;
}

// ── State ────────────────────────────────────────────────────────────────────

let state       = 'idle';   // 'idle' | 'picking' | 'revealing' | 'revealed'
let pickIndices = [];
let resetTimer  = null;

// ── Round: show 3 face-down pick cards ──────────────────────────────────────

async function startRound() {
  clearTimeout(resetTimer);
  state = 'idle';

  // Inject SVGs (idempotent — skip if already set)
  for (let i = 0; i < 3; i++) {
    const pc = $(`pc-${i}`);
    if (!pc.querySelector('svg')) pc.innerHTML = BACK_SVG;
  }
  const hl = $('hand-left'), hr = $('hand-right');
  if (!hl.querySelector('svg')) hl.innerHTML = HAND_SVG;
  if (!hr.querySelector('svg')) hr.innerHTML = HAND_SVG;

  // Pick 3 principles for this round
  pickIndices = pickThree();

  // Reset pick cards
  for (let i = 0; i < 3; i++) {
    $(`pc-${i}`).classList.remove('shown', 'interactive', 'dismissed');
  }
  $('pick-hint').style.opacity = '0';

  // Reset progress bar (no animation)
  const bar = $('progress-bar');
  bar.style.transition = 'none';
  bar.style.width      = '0%';

  // Hide reveal, show pick
  $('reveal-view').classList.remove('active');
  $('pick-view').classList.remove('hidden');

  // Reset card transform
  const card = $('card');
  card.style.transition = 'none';
  card.style.transform  = 'rotateY(-90deg)';

  // Raise hands
  await wait(120);
  hl.classList.add('raised');
  hr.classList.add('raised');
  await wait(680);

  // Stagger cards in
  for (let i = 0; i < 3; i++) {
    $(`pc-${i}`).classList.add('shown');
    await wait(160);
  }
  await wait(380);

  // Hands retreat
  hl.classList.remove('raised');
  hr.classList.remove('raised');
  await wait(550);

  // Show hint and enable picking
  $('pick-hint').style.opacity = '1';
  for (let i = 0; i < 3; i++) $(`pc-${i}`).classList.add('interactive');
  state = 'picking';
}

// ── Choose a card ─────────────────────────────────────────────────────────────

async function chooseCard(cardIdx) {
  if (state !== 'picking') return;
  state = 'revealing';

  // Remove interactivity & hint
  for (let i = 0; i < 3; i++) $(`pc-${i}`).classList.remove('interactive');
  $('pick-hint').style.opacity = '0';

  // Dismiss unchosen cards
  for (let i = 0; i < 3; i++) {
    if (i !== cardIdx) $(`pc-${i}`).classList.add('dismissed');
  }
  await wait(380);

  // Render chosen principle
  renderPrinciple(pickIndices[cardIdx]);

  // Switch to reveal view
  $('pick-view').classList.add('hidden');
  $('reveal-view').classList.add('active');

  // Flip card from face-down to revealed
  const card = $('card');
  card.style.transition = 'none';
  card.style.transform  = 'rotateY(-90deg)';
  card.getBoundingClientRect(); // force reflow
  card.style.transition = 'transform 480ms cubic-bezier(0.22,1,0.36,1)';
  card.style.transform  = 'rotateY(0deg)';
  await wait(520);

  // Start 6-second progress bar
  const bar = $('progress-bar');
  bar.style.transition = 'none';
  bar.style.width      = '0%';
  bar.getBoundingClientRect();
  bar.style.transition = 'width 6s linear';
  bar.style.width      = '100%';

  state     = 'revealed';
  resetTimer = setTimeout(() => startRound(), 6500);
}

// ── Boot ─────────────────────────────────────────────────────────────────────

buildStars();
startRound();
</script>
</body>
</html>
